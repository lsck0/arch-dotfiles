<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>start</title>
<style>
  :root {
    --background: #07090d;
    --foreground: #bfbdb6;
    --muted:      #565b66;
    --cell:       #59c2ff;
  }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--background);
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #clock {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: "JetBrainsMono Nerd Font", monospace;
    color: var(--foreground);
    text-align: center;
    user-select: none;
    pointer-events: none;
  }
  #time {
    font-size: 5.5rem;
    font-weight: 600;
    letter-spacing: 2px;
  }
  #date {
    font-size: 1.1rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="clock">
  <div id="time">--:--</div>
  <div id="date"></div>
</div>
<script>
"use strict";

const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");

const style = getComputedStyle(document.documentElement);
const background_color = style.getPropertyValue("--background").trim();
const cell_color = style.getPropertyValue("--cell").trim();

const cell_size = 18;             /* pixels per cell */
const generation_interval = 120;  /* milliseconds between generations */
const seed_probability = 0.10;    /* fraction of cells alive at start */
const cell_opacity = 0.45;
const corner_radius = 5;
const bloom_radius = 15;

/* Build "rgba(r, g, b, a)" from a "#rrggbb" string and an alpha value. */
function with_opacity(hex_color, alpha)
{
  const value = parseInt(hex_color.slice(1), 16);
  const red = (value >> 16) & 255;
  const green = (value >> 8) & 255;
  const blue = value & 255;
  return "rgba(" + red + ", " + green + ", " + blue + ", " + alpha + ")";
}

const cell_fill = with_opacity(cell_color, cell_opacity);

let columns = 0;
let rows = 0;
let cells = null;

function cell_index(x, y)
{
  return y * columns + x;
}

function seed_cells()
{
  for (let i = 0; i < cells.length; i++) {
    cells[i] = (Math.random() < seed_probability) ? 1 : 0;
  }
}

function resize()
{
  const ratio = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * ratio;
  canvas.height = window.innerHeight * ratio;
  context.setTransform(ratio, 0, 0, ratio, 0, 0);

  columns = Math.ceil(window.innerWidth / cell_size);
  rows = Math.ceil(window.innerHeight / cell_size);
  cells = new Uint8Array(columns * rows);

  seed_cells();
}

/* Count the live neighbours of a cell, wrapping around the grid edges. */
function count_neighbours(x, y)
{
  let count = 0;

  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (dx == 0 && dy == 0) {
        continue;
      }

      const neighbour_x = (x + dx + columns) % columns;
      const neighbour_y = (y + dy + rows) % rows;
      count += cells[cell_index(neighbour_x, neighbour_y)];
    }
  }

  return count;
}

let previous_population = -1;
let stale_generations = 0;

/* Advance the simulation by one generation, reseeding when it dies or stalls. */
function advance_generation()
{
  const next_cells = new Uint8Array(cells.length);
  let population = 0;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < columns; x++) {
      const neighbours = count_neighbours(x, y);
      const alive = cells[cell_index(x, y)];
      const survives = alive ? (neighbours == 2 || neighbours == 3)
                             : (neighbours == 3);

      next_cells[cell_index(x, y)] = survives ? 1 : 0;
      if (survives) {
        population++;
      }
    }
  }

  cells = next_cells;

  if (population == 0) {
    seed_cells();
    stale_generations = 0;
  } else {
    if (Math.abs(population - previous_population) < 2) {
      stale_generations++;
    } else {
      stale_generations = 0;
    }

    if (stale_generations > 18) {
      seed_cells();
      stale_generations = 0;
    }
  }

  previous_population = population;
}

function draw()
{
  context.fillStyle = background_color;
  context.fillRect(0, 0, canvas.width, canvas.height);

  context.fillStyle = cell_fill;
  context.shadowColor = cell_color;
  context.shadowBlur = bloom_radius;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < columns; x++) {
      if (cells[cell_index(x, y)]) {
        context.beginPath();
        context.roundRect(x * cell_size + 1, y * cell_size + 1,
                          cell_size - 2, cell_size - 2, corner_radius);
        context.fill();
      }
    }
  }

  context.shadowBlur = 0;
}

/*
 * Render every animation frame for smooth output, but only step the
 * simulation once enough time has elapsed. Accumulating the elapsed time
 * keeps the generation rate independent of the display refresh rate.
 */
let last_frame_time = performance.now();
let elapsed_since_generation = 0;

function frame(now)
{
  elapsed_since_generation += now - last_frame_time;
  last_frame_time = now;

  while (elapsed_since_generation >= generation_interval) {
    advance_generation();
    elapsed_since_generation -= generation_interval;
  }

  draw();
  requestAnimationFrame(frame);
}

function update_clock()
{
  const now = new Date();
  const pad = function (number) {
    return String(number).padStart(2, "0");
  };

  document.getElementById("time").textContent =
    pad(now.getHours()) + ":" + pad(now.getMinutes());
  document.getElementById("date").textContent =
    now.toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
}

window.addEventListener("resize", resize);

resize();
requestAnimationFrame(frame);

update_clock();
setInterval(update_clock, 10000);
</script>
</body>
</html>
