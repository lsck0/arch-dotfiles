general {
    gaps_in     = 4
    gaps_out    = 8
    border_size = 2

    col.active_border   = $color1 $color2 $color3 45deg
    col.inactive_border = rgba(2a2a2aaa)

    layout = dwindle
}

decoration {
    screen_shader      = ~/.config/hypr/shaders/color-correction.frag

    active_opacity     = 1.0
    inactive_opacity   = 0.98
    fullscreen_opacity = 1.0

    rounding           = 6

    dim_inactive       = false
    dim_strength       = 0.0

    blur {
        enabled           = true
        xray              = true
        size              = 3
        passes            = 1
        new_optimizations = true
        popups            = true
        vibrancy          = 0.1796
        vibrancy_darkness = 3.0
    }

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(00000055)
    }
}

group {
    col.border_active   = $color1 $color2 $color3 45deg
    col.border_inactive = rgba(00000000)

    groupbar {
        enabled       = true
        height        = 3
        render_titles = false
        col.active   = $color2
        col.inactive = rgba(000000cc)
    }
}

animations {
    enabled = true

    bezier = linear,              0,    0,    1,           1
    bezier = md3_standard,        0.2,  0,    0,           1
    bezier = md3_decel,           0.05, 0.7,  0.1,         1
    bezier = md3_accel,           0.3,  0,    0.8,         0.15
    bezier = overshot,            0.05, 0.9,  0.1,         1.1
    bezier = crazyshot,           0.1,  1.5,  0.76,        0.92
    bezier = hyprnostretch,       0.05, 0.9,  0.1,         1.0
    bezier = menu_decel,          0.1,  1,    0,           1
    bezier = menu_accel,          0.38, 0.04, 1,           0.07
    bezier = easeInOutCirc,       0.85, 0,    0.15,        1
    bezier = easeOutCirc,         0,    0.55, 0.45,        1
    bezier = easeOutExpo,         0.16, 1,    0.3,         1
    bezier = softAcDecel,         0.26, 0.26, 0.15,        1
    bezier = md2,                 0.4,  0,    0.2,         1 # use with .2s duration

    animation = windowsIn,        1,    3.5,  overshot,    popin 70%
    animation = windowsOut,       1,    2.5,  md3_accel,   popin 70%
    animation = windowsMove,      1,    3,    md3_decel
    animation = border,           1,    8,    default
    animation = fade,             1,    2.5,  md3_decel
    animation = layers,           1,    2,    md3_decel,   slide
    animation = layersIn,         1,    3,    menu_decel,  slide
    animation = layersOut,        1,    0.8,  menu_accel
    animation = fadeLayersIn,     1,    2,    menu_decel
    animation = fadeLayersOut,    1,    1.5,  menu_accel
    animation = workspaces,       1,    1.6,  softAcDecel, slidefade 15%
    animation = specialWorkspace, 1,    3,    md3_decel,   slidefadevert 15%
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}
